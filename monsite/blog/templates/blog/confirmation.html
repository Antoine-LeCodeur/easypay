<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        {% load static %}
        <link rel="stylesheet" href="{% static 'blog/style.css' %}" />
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .confirmation-container {
                background: white;
                border-radius: 20px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                padding: 60px 40px;
                text-align: center;
                max-width: 600px;
                animation: slideIn 0.6s ease-out;
            }

            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateY(-30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .success-icon {
                width: 100px;
                height: 100px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border-radius: 50%;
                display: flex;
                justify-content: center;
                align-items: center;
                margin: 0 auto 30px;
                animation: scaleIn 0.6s ease-out;
                box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            }

            @keyframes scaleIn {
                from {
                    transform: scale(0);
                }
                to {
                    transform: scale(1);
                }
            }

            .success-icon::before {
                content: "✓";
                color: white;
                font-size: 60px;
                font-weight: bold;
            }

            h1 {
                font-size: 48px;
                color: #333;
                margin: 0 0 15px 0;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            .confirmation-message {
                font-size: 16px;
                color: #666;
                margin-bottom: 40px;
                line-height: 1.6;
            }

            .btn-retour {
                display: inline-block;
                padding: 16px 50px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                text-decoration: none;
                border-radius: 50px;
                font-size: 16px;
                font-weight: 600;
                border: none;
                cursor: pointer;
                transition: all 0.3s ease;
                box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            }

            .btn-retour:hover {
                transform: translateY(-3px);
                box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
            }

            .btn-retour:active {
                transform: translateY(-1px);
            }
        </style>
        <title>Enregistrement confirmé - EasyPay</title>
    </head>
    <body>
        <div class="confirmation-container">
            <div class="success-icon"></div>
            <h1>Bien enregistré !</h1>
            <p class="confirmation-message">
                Vos données de paie ont été enregistrées avec succès.
            </p>
            <a href="/" class="btn-retour">Retour à la page personnelle</a>
        </div>
    </body>
</html>

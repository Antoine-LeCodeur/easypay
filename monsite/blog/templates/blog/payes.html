{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="{% static 'blog/payes.css' %}" />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Paye</title>
    </head>
    <body>
        <header>
            <div class="header-color">
                <div class="header-color-titre">
                    <a href="index.html"><h1>EasyPay</h1></a>
                </div>
            </div>
        </header>
        <main>
            <div class="main-box">
                <div class="main-box-box">
                    <div class="main-box-box-input">
                        <form action="">
                            <label for="">Service :</label>

                            <select name="services" id="services">
                                <option value="">Tous les services</option>
                                {% for service in services %}
                                <option value="{{ service }}">{{ service }}</option>
                                {% endfor %}
                            </select>
                            <label for="choix">Nom : </label>
                            <select name="choix" id="choix">
                                <option value="">Sélectionnez un nom</option>
                            </select>
                            <label for="prime">Prime : </label>
                            <input type="number" name="prime" id="prime" placeholder="Montant de la prime" />
                            <label for="heure-sup">Heure Sup : </label>
                            <input type="number" name="heure-sup" id="heure-sup" placeholder="Nombre d'heures supplémentaires" />
                        </form>
                        <div class="main-box-box-input-salaire">
                            <h4>Salaires : <span id="salaire-display">-</span> €</h4>
                        </div>
                    </div>
                    <div class="main-box-box-button">
                        <button id="main-box-box-button-telecharger">Télécharger</button>
                        <button id="main-box-box-button-envoyer">Envoyer</button>
                        <button id="main-box-box-button-enregistrer" type="submit">Enregistrer</button>
                    </div>
                </div>
            </div>
        </main>
        <div id="utilisateurs-data" data-utilisateurs="{{ utilisateurs_json }}"></div>
        <div id="historique-data" data-historique="{{ historique_json|default:"" }}"></div>
        <script>
            const utilisateursList = JSON.parse(document.getElementById("utilisateurs-data").getAttribute("data-utilisateurs"));
            const historiqueDataElement = document.getElementById("historique-data");
            let historiqueSelectionne = null;

            if (historiqueDataElement) {
                const historiqueRaw = historiqueDataElement.getAttribute("data-historique") || "";
                if (historiqueRaw) {
                    try {
                        historiqueSelectionne = JSON.parse(historiqueRaw);
                    } catch (error) {
                        historiqueSelectionne = null;
                    }
                }
            }

            const servicesSelect = document.getElementById("services");
            const nomSelect = document.getElementById("choix");
            const primeInput = document.getElementById("prime");
            const heureSupInput = document.getElementById("heure-sup");
            const salaireDisplay = document.getElementById("salaire-display");
            const boutonTelecharger = document.getElementById("main-box-box-button-telecharger");
            const boutonEnvoyer = document.getElementById("main-box-box-button-envoyer");
            const boutonEnregistrer = document.getElementById("main-box-box-button-enregistrer");
            const salaireFormatter = new Intl.NumberFormat("fr-FR", {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2,
            });
            const TAUX_HEURE_SUP = 100;
            const enregistrerUrl = "{% url 'enregistrer_paye' %}";
            const historiqueUrl = "{% url 'historique' %}";

            let utilisateurSelectionne = null;

            // Mettre à jour les noms quand le service change
            servicesSelect.addEventListener("change", function () {
                mettreAJourNoms(this.value);
            });

            // Mettre à jour le salaire quand le nom change
            nomSelect.addEventListener("change", function () {
                if (this.value) {
                    utilisateurSelectionne = utilisateursList.find((u) => u.id == this.value) || null;
                } else {
                    utilisateurSelectionne = null;
                }
                recalculerSalaire();
            });

            primeInput.addEventListener("input", recalculerSalaire);
            heureSupInput.addEventListener("input", recalculerSalaire);

            boutonEnregistrer.addEventListener("click", async function (event) {
                event.preventDefault();

                if (!utilisateurSelectionne) {
                    return;
                }

                const prime = lireNombre(primeInput);
                const heuresSup = lireNombre(heureSupInput);
                const utilisateurId = Number(nomSelect.value);
                const utilisateurNom = nomSelect.options[nomSelect.selectedIndex]?.textContent || "";

                if (!Number.isFinite(utilisateurId)) {
                    return;
                }

                boutonEnregistrer.disabled = true;

                try {
                    const payload = {
                        utilisateur_id: utilisateurId,
                        utilisateur_nom: utilisateurNom,
                        prime: prime,
                        heures_sup: heuresSup,
                    };

                    if (historiqueSelectionne && historiqueSelectionne.id) {
                        payload.historique_id = historiqueSelectionne.id;
                    }

                    const response = await fetch(enregistrerUrl, {
                        method: "POST",
                        credentials: "same-origin",
                        headers: {
                            "Content-Type": "application/json",
                            "X-CSRFToken": getCookie("csrftoken"),
                        },
                        body: JSON.stringify(payload),
                    });

                    if (!response.ok) {
                        const message = await response.text();
                        alert("Erreur lors de l'enregistrement. " + message);
                        return;
                    }

                    if (historiqueSelectionne && historiqueSelectionne.id) {
                        window.location.href = historiqueUrl;
                        return;
                    }

                    supprimerUtilisateur(utilisateurId);
                    primeInput.value = "";
                    heureSupInput.value = "";
                    mettreAJourNoms(servicesSelect.value);
                } catch (error) {
                    alert("Erreur lors de l'enregistrement.");
                } finally {
                    mettreAJourBoutons(Boolean(utilisateurSelectionne));
                }
            });

            function mettreAJourNoms(serviceFiltre) {
                nomSelect.innerHTML = '<option value="">Sélectionnez un nom</option>';
                utilisateurSelectionne = null;
                recalculerSalaire();

                // Filtrer les utilisateurs par service
                let utilisateursFiltres = utilisateursList;
                if (serviceFiltre) {
                    utilisateursFiltres = utilisateursList.filter((u) => u.service === serviceFiltre);
                }

                // Ajouter les options
                utilisateursFiltres.forEach((user) => {
                    const option = document.createElement("option");
                    option.value = user.id;
                    option.textContent = user.nomprenom;
                    nomSelect.appendChild(option);
                });
            }

            function lireNombre(input) {
                const raw = (input.value || "").toString().replace(",", ".");
                const value = parseFloat(raw);
                return Number.isFinite(value) ? value : 0;
            }

            function recalculerSalaire() {
                if (!utilisateurSelectionne) {
                    salaireDisplay.textContent = "-";
                    mettreAJourBoutons(false);
                    return;
                }

                const base = parseFloat(utilisateurSelectionne.paye);
                const prime = lireNombre(primeInput);
                const heuresSup = lireNombre(heureSupInput);
                const total = base + prime + heuresSup * TAUX_HEURE_SUP;

                if (Number.isFinite(total)) {
                    salaireDisplay.textContent = salaireFormatter.format(total);
                    mettreAJourBoutons(true);
                    return;
                }

                salaireDisplay.textContent = "-";
                mettreAJourBoutons(true);
            }

            function mettreAJourBoutons(estActif) {
                boutonTelecharger.disabled = !estActif;
                boutonEnvoyer.disabled = !estActif;
                boutonEnregistrer.disabled = !estActif;
            }

            function supprimerUtilisateur(utilisateurId) {
                const index = utilisateursList.findIndex((u) => u.id == utilisateurId);
                if (index >= 0) {
                    utilisateursList.splice(index, 1);
                }
            }

            function getCookie(name) {
                const cookies = document.cookie ? document.cookie.split(";") : [];
                for (let i = 0; i < cookies.length; i += 1) {
                    const cookie = cookies[i].trim();
                    if (cookie.startsWith(name + "=")) {
                        return decodeURIComponent(cookie.substring(name.length + 1));
                    }
                }
                return "";
            }

            // Événement pour le bouton Télécharger
            boutonTelecharger.addEventListener("click", async function (event) {
                event.preventDefault();

                if (!utilisateurSelectionne) {
                    alert("Veuillez sélectionner un employé.");
                    return;
                }

                const prime = lireNombre(primeInput);
                const heuresSup = lireNombre(heureSupInput);
                const utilisateurId = Number(nomSelect.value);

                if (!Number.isFinite(utilisateurId)) {
                    alert("Employé invalide.");
                    return;
                }

                boutonTelecharger.disabled = true;

                try {
                    const response = await fetch("{% url 'telecharger_fiche_paye' %}", {
                        method: "POST",
                        credentials: "same-origin",
                        headers: {
                            "Content-Type": "application/json",
                            "X-CSRFToken": getCookie("csrftoken"),
                        },
                        body: JSON.stringify({
                            utilisateur_id: utilisateurId,
                            prime: prime,
                            heures_sup: heuresSup,
                        }),
                    });

                    if (!response.ok) {
                        const message = await response.text();
                        alert("Erreur lors de la génération du PDF.");
                        return;
                    }

                    // Télécharger le fichier PDF
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `Fiche_Paye_${utilisateurSelectionne.nomprenom}_${new Date().getMonth() + 1}_${new Date().getFullYear()}.pdf`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                } catch (error) {
                    alert("Erreur lors du téléchargement du PDF.");
                    console.error(error);
                } finally {
                    mettreAJourBoutons(Boolean(utilisateurSelectionne));
                }
            });

            // Événement pour le bouton Envoyer
            boutonEnvoyer.addEventListener("click", async function (event) {
                event.preventDefault();

                if (!utilisateurSelectionne) {
                    alert("Veuillez sélectionner un employé.");
                    return;
                }

                const prime = lireNombre(primeInput);
                const heuresSup = lireNombre(heureSupInput);
                const utilisateurId = Number(nomSelect.value);

                if (!Number.isFinite(utilisateurId)) {
                    alert("Employé invalide.");
                    return;
                }

                boutonEnvoyer.disabled = true;

                try {
                    const response = await fetch("{% url 'envoyer_fiche_paye' %}", {
                        method: "POST",
                        credentials: "same-origin",
                        headers: {
                            "Content-Type": "application/json",
                            "X-CSRFToken": getCookie("csrftoken"),
                        },
                        body: JSON.stringify({
                            utilisateur_id: utilisateurId,
                            prime: prime,
                            heures_sup: heuresSup,
                        }),
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        alert("Erreur: " + (errorData.error || "Erreur lors de l'envoi"));
                        return;
                    }

                    const data = await response.json();
                    alert("✓ Email envoyé à " + utilisateurSelectionne.mail);
                } catch (error) {
                    alert("Erreur lors de l'envoi du PDF.");
                    console.error(error);
                } finally {
                    mettreAJourBoutons(Boolean(utilisateurSelectionne));
                }
            });

            function initialiserFormulaire() {
                if (historiqueSelectionne) {
                    servicesSelect.value = historiqueSelectionne.service || "";
                    mettreAJourNoms(servicesSelect.value);
                    nomSelect.value = String(historiqueSelectionne.utilisateur_id || "");
                    utilisateurSelectionne =
                        utilisateursList.find((u) => u.id == historiqueSelectionne.utilisateur_id) || null;
                    primeInput.value = historiqueSelectionne.prime ?? "";
                    heureSupInput.value = historiqueSelectionne.heures_sup ?? "";
                    servicesSelect.disabled = true;
                    nomSelect.disabled = true;
                } else {
                    mettreAJourNoms("");
                }

                recalculerSalaire();
            }

            // Charger les noms au demarrage
            initialiserFormulaire();
        </script>
    </body>
</html>

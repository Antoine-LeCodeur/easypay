{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="{% static 'blog/payes.css' %}" />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Paye</title>
    </head>
    <body>
        <header>
            <div class="header-color">
                <div class="header-color-titre">
                    <a href="index.html"><h1>EasyPay</h1></a>
                </div>
            </div>
        </header>
        <main>
            <div class="main-box">
                <div class="main-box-box">
                    <div class="main-box-box-input">
                        <form action="">
                            <label for="">Service :</label>

                            <select name="services" id="services">
                                <option value="">Tous les services</option>
                                {% for service in services %}
                                    <option value="{{ service }}">{{ service }}</option>
                                {% endfor %}
                            </select>
                            <label for="choix">Nom : </label>
                            <select name="choix" id="choix">
                                <option value="">Sélectionnez un nom</option>
                            </select>
                            <label for="prime">Prime : </label>
                            <input type="number" name="prime" id="prime" placeholder="Montant de la prime" />
                            <label for="heure-sup">Heure Sup : </label>
                            <input type="number" name="heure-sup" id="heure-sup" placeholder="Nombre d'heures supplémentaires" />
                        </form>
                        <div class="main-box-box-input-salaire">
                            <h4>Salaires : <span id="salaire-display">-</span> €</h4>
                        </div>
                    </div>
                    <div class="main-box-box-button">
                        <button id="main-box-box-button-telecharger">Télécharger</button>
                        <button id="main-box-box-button-envoyer">Envoyer</button>
                        <button id="main-box-box-button-enregistrer" type="submit">Enregistrer</button>
                    </div>
                </div>
            </div>
        </main>
        <div id="utilisateurs-data" data-utilisateurs="{{ utilisateurs_json }}"></div>
        <script>
            const utilisateursList = JSON.parse(document.getElementById('utilisateurs-data').getAttribute('data-utilisateurs'));
            
            const servicesSelect = document.getElementById('services');
            const nomSelect = document.getElementById('choix');
            const salaireDisplay = document.getElementById('salaire-display');
            
            // Mettre à jour les noms quand le service change
            servicesSelect.addEventListener('change', function() {
                mettreAJourNoms(this.value);
            });
            
            // Mettre à jour le salaire quand le nom change
            nomSelect.addEventListener('change', function() {
                if (this.value) {
                    const user = utilisateursList.find(u => u.id == this.value);
                    if (user) {
                        salaireDisplay.textContent = user.paye;
                    }
                } else {
                    salaireDisplay.textContent = '-';
                }
            });
            
            function mettreAJourNoms(serviceFiltre) {
                nomSelect.innerHTML = '<option value="">Sélectionnez un nom</option>';
                salaireDisplay.textContent = '-';
                
                // Filtrer les utilisateurs par service
                let utilisateursFiltres = utilisateursList;
                if (serviceFiltre) {
                    utilisateursFiltres = utilisateursList.filter(u => u.service === serviceFiltre);
                }
                
                // Ajouter les options
                utilisateursFiltres.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.id;
                    option.textContent = user.nomprenom;
                    nomSelect.appendChild(option);
                });
            }
            
            // Charger tous les noms au démarrage
            mettreAJourNoms('');
        </script>
    </body>
</html>

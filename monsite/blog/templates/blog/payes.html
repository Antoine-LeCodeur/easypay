{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="{% static 'blog/payes.css' %}" />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Paye</title>
    </head>
    <body>
        <header>
            <div class="header-color">
                <div class="header-color-titre">
                    <a href="index.html"><h1>EasyPay</h1></a>
                </div>
            </div>
        </header>
        <main>
            <div class="main-box">
                <div class="main-box-box">
                    <div class="main-box-box-input">
                        <form action="">
                            <label for="">Service :</label>

                            <select name="services" id="services">
                                <option value="tous">Tous</option>
                                {% for service in services %}
                                    <option value="{{ service }}">{{ service }}</option>
                                {% endfor %}
                            </select>
                            <label for="choix">Nom : </label>
                            <select name="choix" id="choix">
                                <option value="">Sélectionnez un nom</option>
                            </select>
                            <label for="prime">Prime : </label>
                            <input type="number" name="prime" id="prime" placeholder="Montant de la prime" />
                            <label for="heure-sup">Heure Sup : </label>
                            <input type="number" name="heure-sup" id="heure-sup" placeholder="Nombre d'heures supplémentaires" />
                        </form>
                        <div class="main-box-box-input-salaire">
                            <h4>Salaires : <span id="salaire-display">-</span> €</h4>
                        </div>
                    </div>
                    <div class="main-box-box-button">
                        <button id="main-box-box-button-telecharger">Télécharger</button>
                        <button id="main-box-box-button-envoyer">Envoyer</button>
                        <button id="main-box-box-button-enregistrer" type="submit">Enregistrer</button>
                    </div>
                </div>
            </div>
        </main>
        <script>
            const servicesSelect = document.getElementById('services');
            const noinSelect = document.getElementById('choix');
            const salaireDisplay = document.getElementById('salaire-display');
            
            // Charger les utilisateurs initiaux (tous)
            loadUtilisateurs('tous');
            
            // Écouter le changement du service
            servicesSelect.addEventListener('change', function() {
                loadUtilisateurs(this.value);
            });
            
            // Écouter le changement du nom
            noinSelect.addEventListener('change', function() {
                if (this.value) {
                    loadUtilisateurDetail(this.value);
                } else {
                    salaireDisplay.textContent = '-';
                }
            });
            
            function loadUtilisateurs(service) {
                fetch(`/blog/api/utilisateurs-by-service/?service=${service}`)
                    .then(response => response.json())
                    .then(data => {
                        noinSelect.innerHTML = '<option value="">Sélectionnez un nom</option>';
                        data.forEach(utilisateur => {
                            const option = document.createElement('option');
                            option.value = utilisateur.id;
                            option.textContent = utilisateur.nomprenom;
                            noinSelect.appendChild(option);
                        });
                        salaireDisplay.textContent = '-';
                    })
                    .catch(error => console.error('Erreur:', error));
            }
            
            function loadUtilisateurDetail(utilisateurId) {
                fetch(`/blog/api/utilisateur-detail/?id=${utilisateurId}`)
                    .then(response => response.json())
                    .then(data => {
                        salaireDisplay.textContent = data.paye;
                    })
                    .catch(error => console.error('Erreur:', error));
            }
        </script>
    </body>
</html>

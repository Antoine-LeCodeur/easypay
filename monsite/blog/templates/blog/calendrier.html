        <script>
            // Array of months in French
            const months = ["Janvier", "Fevrier", "Mars", "Avril", "Mai", "Juin", "Juillet", "Aout", "Septembre", "Octobre", "Novembre", "Decembre"];

            // Get current month (0-11)
            const currentMonth = new Date().getMonth();

            // Get all month boxes
            const monthBoxes = document.querySelectorAll(".main-box-box");

            // Apply colors based on month comparison
            monthBoxes.forEach((box, index) => {
                // Remove all color classes
                box.classList.remove("main-box-box-red", "main-box-box-green", "main-box-box-black");

                // Apply appropriate color class
                if (index < currentMonth) {
                    // Past months - Red
                    box.classList.add("main-box-box-red");
                } else if (index === currentMonth) {
                    // Current month - Green
                    box.classList.add("main-box-box-green");
                } else {
                    // Future months - Black
                    box.classList.add("main-box-box-black");
                }
            });
        </script>
